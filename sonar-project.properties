# Unique project key
sonar.projectKey=dha-device-hub

# Project name
sonar.projectName=dha-device-hub

# Source directory
sonar.sources=src

# Exclude unnecessary files
sonar.exclusions=node_modules/**,dist/**,coverage/**,vite.config.ts,Dockerfile

# Optional: if you later add tests
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Coverage (will work once you add real tests)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
